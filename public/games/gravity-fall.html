<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Leaper: Sky Shift (Pixel Perfect & Audio)</title>
    <style>
        :root {
            --bg: #050508;
            --player: #00ff41;
            --hazard: #ff003c;
            --platform: #222233;
            --sky-bg: #87CEEB;
        }
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body {
            margin: 0; background: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }
        #game-container { position: relative; width: 100vw; height: 100vh; background: var(--bg); }
        /* Forces nearest-neighbor scaling for sharp pixel art */
        canvas { 
            display: block; width: 100%; height: 100%; object-fit: contain; 
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated; 
            image-rendering: crisp-edges;
        }
        #ui {
            position: absolute; top: 20px; left: 20px; color: var(--player);
            font-size: 24px; font-weight: bold; pointer-events: none;
            text-shadow: 2px 2px 0 #000;
        }
        #controls {
            position: absolute; bottom: 30px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; pointer-events: none;
        }
        .ctrl-btn {
            width: 60px; height: 60px; background: rgba(0, 255, 65, 0.1);
            border: 4px solid var(--player); color: var(--player);
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 24px; pointer-events: auto;
            box-shadow: inset 0 0 10px rgba(0,255,65,0.2);
        }
        .ctrl-btn:active { background: rgba(0, 255, 65, 0.4); }
        #overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 100; color: var(--player); text-align: center;
            border: 8px double var(--player); margin: 20px;
        }
        .btn {
            background: var(--player); color: #000; border: none;
            padding: 10px 30px; font-size: 20px; font-family: inherit;
            font-weight: bold; cursor: pointer; margin-top: 20px;
            box-shadow: 4px 4px 0 #fff; transition: transform 0.1s;
        }
        .btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0 #fff; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">DIST: <span id="lvl-val">0</span>m <span id="mode-tag"></span></div>
    <canvas id="gameCanvas"></canvas>
    <div id="controls">
        <div style="display:flex; gap:10px">
            <div class="ctrl-btn" id="btn-left"><</div>
            <div class="ctrl-btn" id="btn-right">></div>
        </div>
        <div class="ctrl-btn" id="btn-jump">^</div>
    </div>
    <div id="overlay">
        <h1>NEON LEAPER</h1>
        <p id="status-msg">PIXEL PROTOCOL v2.0</p>
        <button class="btn" id="start-btn">BOOT SYSTEM</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('start-btn');
    const overlay = document.getElementById('overlay');
    const scoreVal = document.getElementById('lvl-val');
    const modeTag = document.getElementById('mode-tag');

    // Strict retro resolution
    const V_WIDTH = 480; 
    const V_HEIGHT = 270;

    let gameActive = false;
    let score = 0;
    let keys = {};
    let touchMove = { left: false, right: false, jump: false };
    let isSkyMode = false;
    let returnX = 50;

    // Physics
    const gravity = 0.45;
    const friction = 0.8;
    const jumpPower = -8.5;
    const moveSpeed = 0.7;
    const maxSpeed = 4.5;

    let player = { x: 50, y: 150, w: 14, h: 14, vx: 0, vy: 0, grounded: false, falling: false };
    let camera = { x: 0, y: 0 };
    let platforms = [];
    let hazards = [];
    let doors = [];
    let lastGenX = 0;

    // --- AUDIO SYSTEM (Web Audio API for 8-bit sounds) ---
    let audioCtx;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const now = audioCtx.currentTime;
        
        if (type === 'jump') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
            gainNode.gain.setValueAtTime(0.1, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'crash') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, now);
            osc.frequency.exponentialRampToValueAtTime(10, now + 0.3);
            gainNode.gain.setValueAtTime(0.2, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        } else if (type === 'portal') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.linearRampToValueAtTime(800, now + 0.3);
            gainNode.gain.setValueAtTime(0.1, now);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
        } else if (type === 'fall') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
            gainNode.gain.setValueAtTime(0.1, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        }
    }
    // ----------------------------------------------------

    function initGame() {
        initAudio();
        score = 0;
        isSkyMode = false;
        player.x = 50; player.y = 150;
        player.vx = 0; player.vy = 0;
        player.falling = false;
        lastGenX = 0;
        camera.x = 0;
        platforms = [{ x: 0, y: 200, w: 300, h: 100, type: 'neon' }]; 
        hazards = [];
        doors = [];
        generateWorld(1000);
        gameActive = true;
        modeTag.innerText = "";
    }

    function generateWorld(limitX) {
        while (lastGenX < limitX) {
            let gap = 70 + Math.random() * 80;
            let width = 60 + Math.random() * 100;
            let height = 140 + Math.random() * 80;
            let platformX = lastGenX + gap;
            
            platforms.push({ x: platformX, y: height, w: width, h: 120, type: isSkyMode ? 'cloud' : 'neon' });

            // Small Moving Hazards
            if (!isSkyMode && Math.random() > 0.6) {
                hazards.push({ 
                    x: platformX + 10, y: height - 10, w: 12, h: 10, 
                    minX: platformX, maxX: platformX + width - 12, dir: 1, speed: 1 + Math.random() * 2 
                });
            }

            // Doors to Sky
            if (!isSkyMode && Math.random() > 0.85 && platformX > 500) {
                doors.push({ x: platformX + width/2 - 10, y: height - 30, w: 20, h: 30 });
            }

            lastGenX = platformX + width;
        }
    }

    function enterSky() {
        playSound('portal');
        isSkyMode = true;
        returnX = player.x;
        platforms = [{ x: player.x - 50, y: 200, w: 200, h: 50, type: 'cloud' }];
        hazards = [];
        doors = [];
        lastGenX = player.x + 150;
        modeTag.innerText = "| SKY REALM";
        player.y = 100;
    }

    function exitSky() {
        playSound('fall');
        isSkyMode = false;
        player.falling = true;
        player.x = returnX;
        player.y = -50; 
        platforms = [{ x: returnX - 100, y: 200, w: 300, h: 100, type: 'neon' }];
        hazards = [];
        doors = [];
        lastGenX = returnX + 200;
        modeTag.innerText = "";
    }

    window.addEventListener('keydown', e => { 
        keys[e.code] = true;
        if(e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') e.preventDefault();
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    const setupMobile = (id, key) => {
        const btn = document.getElementById(id);
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); touchMove[key] = true; }, {passive: false});
        btn.addEventListener('touchend', (e) => { e.preventDefault(); touchMove[key] = false; }, {passive: false});
    };
    setupMobile('btn-left', 'left');
    setupMobile('btn-right', 'right');
    setupMobile('btn-jump', 'jump');

    function update() {
        if (!gameActive) return;

        // X Movement
        if (keys['ArrowRight'] || keys['KeyD'] || touchMove.right) {
            if (player.vx < maxSpeed) player.vx += moveSpeed;
        } else if (keys['ArrowLeft'] || keys['KeyA'] || touchMove.left) {
            if (player.vx > -maxSpeed) player.vx -= moveSpeed;
        } else {
            player.vx *= friction;
        }

        // Jump Logic
        if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space'] || touchMove.jump) && player.grounded) {
            player.vy = jumpPower;
            player.grounded = false;
            playSound('jump');
        }

        player.vy += gravity;
        player.x += player.vx;
        player.y += player.vy;

        let targetCamX = player.x - V_WIDTH / 3;
        if (targetCamX > camera.x) camera.x += (targetCamX - camera.x) * 0.1;

        if (player.x + 500 > lastGenX) generateWorld(player.x + 1000);
        score = Math.max(score, Math.floor(player.x / 20));
        scoreVal.innerText = score;

        // Platform Collision
        player.grounded = false;
        platforms.forEach(p => {
            if (player.x < p.x + p.w && player.x + player.w > p.x &&
                player.y + player.h > p.y && player.y + player.h < p.y + 20 && player.vy >= 0) {
                player.y = p.y - player.h;
                player.vy = 0;
                player.grounded = true;
                player.falling = false;
            }
        });

        // Hazard Collision
        hazards.forEach(h => {
            h.x += h.dir * h.speed;
            if (h.x > h.maxX || h.x < h.minX) h.dir *= -1;
            if (player.x < h.x + h.w && player.x + player.w > h.x &&
                player.y < h.y + h.h && player.y + player.h > h.y) gameOver();
        });

        // Door Collision
        doors.forEach(d => {
            if (player.x < d.x + d.w && player.x + player.w > d.x &&
                player.y < d.y + d.h && player.y + player.h > d.y) enterSky();
        });

        // Out of Bounds
        if (player.y > V_HEIGHT + 100) {
            if (isSkyMode) exitSky();
            else gameOver();
        }
        if (player.x < camera.x - 100) gameOver();
    }

    function draw() {
        // Dynamic Background
        ctx.fillStyle = isSkyMode ? '#87CEEB' : '#050508';
        ctx.fillRect(0, 0, V_WIDTH, V_HEIGHT);
        
        if (isSkyMode) {
            // Draw Blocky Pixel Sun
            ctx.fillStyle = '#FFD700';
            ctx.fillRect(V_WIDTH - 80, 40, 40, 40);
            ctx.fillRect(V_WIDTH - 85, 45, 50, 30);
            ctx.fillRect(V_WIDTH - 75, 35, 30, 50);
        }

        ctx.save();
        // Force integer camera positioning to prevent sub-pixel blurring
        ctx.translate(-Math.floor(camera.x), 0);

        // Draw Doors (Pixel perfect integers)
        ctx.fillStyle = '#bc13fe';
        doors.forEach(d => {
            let dx = Math.floor(d.x), dy = Math.floor(d.y);
            ctx.fillRect(dx, dy, Math.floor(d.w), Math.floor(d.h));
            ctx.strokeStyle = '#fff';
            ctx.strokeRect(dx + 2, dy + 2, Math.floor(d.w) - 4, Math.floor(d.h) - 4);
        });

        // Draw Platforms
        platforms.forEach(p => {
            let px = Math.floor(p.x), py = Math.floor(p.y);
            let pw = Math.floor(p.w), ph = Math.floor(p.h);
            
            if (p.type === 'cloud') {
                // strict pixel cloud (no anti-aliased roundRect)
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(px + 4, py, pw - 8, 16);
                ctx.fillRect(px, py + 4, pw, 8);
            } else {
                ctx.fillStyle = '#222233';
                ctx.fillRect(px, py, pw, ph);
                ctx.strokeStyle = '#444466';
                ctx.strokeRect(px, py, pw, ph);
                // Top neon rim
                ctx.fillStyle = '#00ff41';
                ctx.fillRect(px, py, pw, 2);
            }
        });

        // Draw Hazards
        ctx.fillStyle = '#ff003c';
        hazards.forEach(h => {
            let hx = Math.floor(h.x), hy = Math.floor(h.y);
            ctx.fillRect(hx, hy, Math.floor(h.w), Math.floor(h.h));
            // Inner eye for hazard
            ctx.fillStyle = '#fff';
            ctx.fillRect(hx + 2, hy + 2, 4, 4);
            ctx.fillStyle = '#ff003c'; // reset
        });

        // Draw Player
        let px = Math.floor(player.x), py = Math.floor(player.y);
        ctx.fillStyle = player.falling ? '#ffff00' : '#00ff41';
        ctx.fillRect(px, py, player.w, player.h);
        
        // Player Eye (Shows direction)
        ctx.fillStyle = '#000';
        let eyeOffset = player.vx >= 0 ? 8 : 2;
        ctx.fillRect(px + eyeOffset, py + 3, 4, 4);

        ctx.restore();

        // Retro CRT Scanline Overlay
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        for(let i = 0; i < V_HEIGHT; i += 2) {
            ctx.fillRect(0, i, V_WIDTH, 1);
        }

        if(gameActive) {
            requestAnimationFrame(() => { update(); draw(); });
        }
    }

    function gameOver() {
        if (!gameActive) return;
        playSound('crash');
        gameActive = false;
        overlay.classList.remove('hidden');
        document.getElementById('status-msg').innerText = `CRASH AT: ${score}m`;
        startBtn.innerText = "RETRY";
        draw(); // Draw one last time to halt animation frame properly
    }

    function resize() {
        canvas.width = V_WIDTH;
        canvas.height = V_HEIGHT;
        // Ensure standard contexts don't smooth rendering
        ctx.imageSmoothingEnabled = false;
    }

    window.addEventListener('resize', resize);
    resize();
    
    startBtn.addEventListener('click', () => { 
        initGame(); 
        overlay.classList.add('hidden'); 
        update(); 
        draw(); 
    });

    // Initial draw for background
    draw();
</script>
</body>
</html>
