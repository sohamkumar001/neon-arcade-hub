<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber-Defender 16-Bit</title>
    <style>
        :root {
            --ui-color: #0cf3ff;
            --enemy-color: #ff0055;
            --bg-dark: #050a0a;
        }


    * {
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-user-select: none; /* Safari */
    -moz-user-select: none;    /* Firefox */
    -ms-user-select: none;     /* IE/Edge */
    user-select: none;         /* Standard */
    -webkit-user-drag: none;   /* Prevents dragging elements in Webkit */
    }

        body {
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: var(--ui-color);
        }

        #game-wrapper {
            position: relative;
            border: 4px solid #1a2a2a;
            background: var(--bg-dark);
            overflow: hidden;
            width: 360px;
            height: 550px;
            box-shadow: 0 0 20px rgba(12, 243, 255, 0.2);
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        #ui {
            width: 360px;
            display: flex;
            justify-content: space-between;
            padding: 10px;
            font-weight: bold;
            text-shadow: 0 0 5px var(--ui-color);
        }

        #overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            text-align: center;
        }

        .restart-btn {
            margin-top: 20px;
            padding: 15px 30px;
            background: var(--ui-color);
            border: none;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 0 #089eb0;
        }

        #mobile-controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 10px;
            pointer-events: none;
        }

        .ctrl-btn {
            pointer-events: auto;
            width: 70px;
            height: 70px;
            background: rgba(12, 243, 255, 0.1);
            border: 2px solid var(--ui-color);
            border-radius: 50%;
            color: var(--ui-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div>ENCRYPTED: <span id="score">0</span></div>
        <div>HP: <span id="hp">100</span>%</div>
    </div>

    <div id="game-wrapper">
        <canvas id="gameCanvas"></canvas>
        
        <div id="overlay">
            <h1 style="color: var(--enemy-color); font-size: 2rem;">CORE BREACHED</h1>
            <p id="final-score" style="margin-top: 10px;"></p>
            <button class="restart-btn" onclick="resetGame()">RE-INITIALIZE</button>
        </div>

        <div id="mobile-controls">
            <div class="ctrl-btn" id="leftBtn">ROT L</div>
            <div class="ctrl-btn" id="fireBtn">FIRE</div>
            <div class="ctrl-btn" id="rightBtn">ROT R</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const hpEl = document.getElementById("hp");
        const overlay = document.getElementById("overlay");

        const W = 360, H = 550;
        canvas.width = W; canvas.height = H;

        let gameActive = false;
        let score = 0, hp = 100;
        let player = { angle: 0, cooldown: 0 };
        let bullets = [], enemies = [], particles = [];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(freq, type, duration, vol = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        const keys = {};
        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);

        function spawnEnemy() {
            if (!gameActive) return;
            const angle = Math.random() * Math.PI * 2;
            const dist = 400;
            enemies.push({
                x: W/2 + Math.cos(angle) * dist,
                y: H/2 + Math.sin(angle) * dist,
                speed: 1.5 + (score / 20),
                size: 15
            });
            setTimeout(spawnEnemy, Math.max(400, 1500 - score * 10));
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<8; i++) {
                particles.push({
                    x, y, 
                    vx: (Math.random()-0.5)*6, 
                    vy: (Math.random()-0.5)*6, 
                    life: 1.0, 
                    color
                });
            }
        }

        function resetGame() {
            score = 0; hp = 100;
            bullets = []; enemies = []; particles = [];
            player.angle = 0;
            gameActive = true;
            scoreEl.innerText = score;
            hpEl.innerText = hp;
            overlay.style.display = "none";
            spawnEnemy();
            update();
        }

        function update() {
            if (!gameActive) return;

            // Rotation
            if (keys['ArrowLeft'] || keys['KeyA']) player.angle -= 0.08;
            if (keys['ArrowRight'] || keys['KeyD']) player.angle += 0.08;

            // Shooting
            if ((keys['Space'] || keys['firing']) && player.cooldown <= 0) {
                bullets.push({
                    x: W/2 + Math.cos(player.angle) * 30,
                    y: H/2 + Math.sin(player.angle) * 30,
                    vx: Math.cos(player.angle) * 8,
                    vy: Math.sin(player.angle) * 8
                });
                player.cooldown = 10;
                playSfx(600, 'triangle', 0.1);
            }
            if (player.cooldown > 0) player.cooldown--;

            // Move Bullets
            bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                if (b.x < 0 || b.x > W || b.y < 0 || b.y > H) bullets.splice(i, 1);
            });

            // Move Enemies
            enemies.forEach((en, i) => {
                const angle = Math.atan2(H/2 - en.y, W/2 - en.x);
                en.x += Math.cos(angle) * en.speed;
                en.y += Math.sin(angle) * en.speed;

                // Hit Core
                const dist = Math.hypot(W/2 - en.x, H/2 - en.y);
                if (dist < 25) {
                    hp -= 10;
                    hpEl.innerText = hp;
                    enemies.splice(i, 1);
                    createExplosion(W/2, H/2, '#ff0055');
                    playSfx(150, 'sawtooth', 0.3);
                    if (hp <= 0) endGame();
                }

                // Hit Bullet
                bullets.forEach((b, bi) => {
                    if (Math.hypot(en.x - b.x, en.y - b.y) < 20) {
                        createExplosion(en.x, en.y, '#0cf3ff');
                        enemies.splice(i, 1);
                        bullets.splice(bi, 1);
                        score++;
                        scoreEl.innerText = score;
                        playSfx(800, 'square', 0.05, 0.05);
                    }
                });
            });

            // Particles
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            });

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = "#050a0a";
            ctx.fillRect(0,0,W,H);

            // Draw Core
            ctx.strokeStyle = varColor('--ui-color');
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(W/2, H/2, 20, 0, Math.PI*2);
            ctx.stroke();
            
            // Draw Player Turret
            ctx.save();
            ctx.translate(W/2, H/2);
            ctx.rotate(player.angle);
            ctx.fillStyle = varColor('--ui-color');
            ctx.fillRect(20, -5, 15, 10);
            ctx.restore();

            // Draw Bullets
            ctx.fillStyle = "#fff";
            bullets.forEach(b => ctx.fillRect(b.x-2, b.y-2, 4, 4));

            // Draw Enemies (Glitchy Rects)
            ctx.fillStyle = varColor('--enemy-color');
            enemies.forEach(en => {
                ctx.fillRect(en.x-8, en.y-8, 16, 16);
                ctx.clearRect(en.x-4, en.y-4, 8, 8);
            });

            // Draw Particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 3, 3);
            });
            ctx.globalAlpha = 1;
        }

        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

        function endGame() {
            gameActive = false;
            document.getElementById("final-score").innerText = "DATA BLOCKS ENCRYPTED: " + score;
            overlay.style.display = "flex";
            playSfx(50, 'sawtooth', 1, 0.2);
        }

        // --- Touch Controls ---
        const setupBtn = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener("touchstart", (e) => { e.preventDefault(); keys[key] = true; });
            btn.addEventListener("touchend", (e) => { e.preventDefault(); keys[key] = false; });
        };
        setupBtn("leftBtn", "ArrowLeft");
        setupBtn("rightBtn", "ArrowRight");
        setupBtn("fireBtn", "firing");

        resetGame();
    </script>
</body>
</html>
