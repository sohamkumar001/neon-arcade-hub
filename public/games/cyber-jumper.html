<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>16-Bit Cyber Jumper</title>
    <style>
        :root {
            --ui-color: #8dbd0c;
            --player-color: #4ade80;
            --plat-color: #5a7a06;
            --bg-dark: #0d1101;
        }

        * {
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            margin: 0; padding: 0; box-sizing: border-box;
        }

        body {
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: var(--ui-color);
        }

        #game-wrapper {
            position: relative;
            border: 6px solid #222;
            background: var(--bg-dark);
            overflow: hidden;
            width: 360px;
            height: 550px;
        }

        /* Scanline Effect */
        #game-wrapper::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 5;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        #ui {
            width: 360px;
            display: flex;
            justify-content: space-between;
            padding: 10px;
            font-weight: bold;
        }

        #overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        /* MOBILE ONLY CONTROLS */
        #mobile-btns {
            display: none; /* Hidden by default (PC) */
            position: absolute;
            bottom: 30px;
            width: 100%;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 10;
        }

        /* Show buttons only on touch devices */
        @media (pointer: coarse) {
            #mobile-btns {
                display: flex;
            }
        }

        .ctrl-btn {
            width: 80px;
            height: 80px;
            background: rgba(141, 189, 12, 0.15);
            border: 4px solid var(--ui-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--ui-color);
            font-size: 14px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.5);
        }

        .ctrl-btn:active {
            background: var(--ui-color);
            color: #000;
            transform: translateY(2px);
        }

        button.restart-btn {
            margin-top: 15px;
            padding: 15px 30px;
            background: var(--ui-color);
            border: none;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            font-size: 1.2rem;
            box-shadow: 4px 4px 0px #444;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div>ALTITUDE: <span id="score">0</span></div>
        <div>HI: <span id="high">0</span></div>
    </div>

    <div id="game-wrapper">
        <canvas id="gameCanvas"></canvas>
        
        <div id="overlay">
            <h1 style="font-size: 2.5rem; color: #e02b2b; text-shadow: 2px 2px #000;">FALLEN</h1>
            <button class="restart-btn" id="rebootBtn">RE-REBOOT</button>
        </div>

        <div id="mobile-btns">
            <div class="ctrl-btn" id="leftBtn">LEFT</div>
            <div class="ctrl-btn" id="rightBtn">RIGHT</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const highEl = document.getElementById("high");
        const overlay = document.getElementById("overlay");
        const rebootBtn = document.getElementById("rebootBtn");

        const width = 360, height = 550;
        const gravity = 0.42, jumpForce = -12.5;
        
        let player, platforms, gameActive = false, loop;
        let score = 0, highscore = localStorage.getItem("jump-hi") || 0;
        let cameraY = 0, keys = {};

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(f, t, d) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.06, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function init() {
            canvas.width = width;
            canvas.height = height;
            highEl.innerText = highscore;
            resetGame();
        }

        function resetGame() {
            cancelAnimationFrame(loop);
            player = { x: width/2 - 12, y: height - 120, w: 24, h: 24, vx: 0, vy: 0 };
            platforms = [];
            // Create initial platforms
            for(let i=0; i<8; i++) {
                platforms.push({ x: Math.random() * (width - 60), y: height - (i * 85), w: 60, h: 12 });
            }
            // First platform right under player
            platforms[0] = { x: width/2 - 30, y: height - 50, w: 60, h: 12 };
            
            score = 0; cameraY = 0;
            scoreEl.innerText = "0";
            overlay.style.display = "none";
            gameActive = true;
            update();
        }

        function update() {
            if (!gameActive) return;

            // Movement Handling
            if (keys['ArrowLeft'] || keys['a'] || keys['left']) player.vx = -7.5;
            else if (keys['ArrowRight'] || keys['d'] || keys['right']) player.vx = 7.5;
            else player.vx *= 0.8;

            player.x += player.vx;
            // Screen Wrap
            if (player.x > width) player.x = -player.w;
            if (player.x < -player.w) player.x = width;

            player.vy += gravity;
            player.y += player.vy;

            // Camera/Scrolling
            if (player.y < height / 2.2) {
                let diff = height / 2.2 - player.y;
                player.y += diff;
                cameraY += diff;
                score = Math.max(score, Math.floor(cameraY/12));
                scoreEl.innerText = score;
                platforms.forEach(p => p.y += diff);
            }

            // Bounce Logic
            if (player.vy > 0) {
                platforms.forEach(p => {
                    if (player.x + player.w > p.x && player.x < p.x + p.w && 
                        player.y + player.h > p.y && player.y + player.h < p.y + p.h + player.vy) {
                        player.vy = jumpForce;
                        playSound(450, 'square', 0.08);
                    }
                });
            }

            // Platform Recycling
            platforms.forEach(p => {
                if (p.y > height) {
                    p.y = Math.min(...platforms.map(pl => pl.y)) - 85;
                    p.x = Math.random() * (width - 60);
                    // Get harder as score increases
                    p.w = Math.max(28, 60 - Math.floor(score/120));
                }
            });

            // Death Check
            if (player.y > height + 40) gameOver();

            draw();
            loop = requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = "#0d1101";
            ctx.fillRect(0, 0, width, height);

            // Platforms
            ctx.fillStyle = "#5a7a06";
            platforms.forEach(p => {
                ctx.fillRect(p.x, p.y, p.w, p.h);
                // Pixel detailing
                ctx.fillStyle = "rgba(0,0,0,0.3)";
                ctx.fillRect(p.x, p.y + 8, p.w, 4);
                ctx.fillStyle = "#5a7a06";
            });

            // Player Animation
            ctx.save();
            ctx.translate(player.x + player.w/2, player.y + player.h/2);
            let stretch = 1 + Math.abs(player.vy) * 0.04;
            ctx.scale(1/stretch, stretch);
            ctx.fillStyle = "#8dbd0c";
            ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
            // Character Face
            ctx.fillStyle = "#000";
            ctx.fillRect(-6, -6, 4, 4); ctx.fillRect(2, -6, 4, 4);
            ctx.restore();
        }

        function gameOver() {
            gameActive = false;
            playSound(100, 'sawtooth', 0.4);
            if (score > highscore) {
                highscore = score;
                localStorage.setItem("jump-hi", highscore);
                highEl.innerText = highscore;
            }
            overlay.style.display = "flex";
        }

        // --- CONTROLS ---

        // PC Keys
        window.addEventListener("keydown", e => keys[e.key] = true);
        window.addEventListener("keyup", e => keys[e.key] = false);

        // Mobile Button Setup
        const setupMobileBtn = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener("touchstart", (e) => { 
                e.preventDefault(); 
                keys[key] = true; 
            }, {passive: false});
            btn.addEventListener("touchend", (e) => { 
                e.preventDefault(); 
                keys[key] = false; 
            }, {passive: false});
        };
        setupMobileBtn("leftBtn", "left");
        setupMobileBtn("rightBtn", "right");

        // UI Interaction
        const handleReboot = (e) => {
            e.preventDefault();
            e.stopPropagation();
            resetGame();
        };

        rebootBtn.addEventListener("click", handleReboot);
        rebootBtn.addEventListener("touchstart", handleReboot, {passive: false});

        init();
    </script>
</body>
</html>
