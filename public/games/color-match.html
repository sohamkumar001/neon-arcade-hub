<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4x4 Color Match</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-color: #1e1e1e;
            --accent-color: #00ff88;
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .header {
            margin-bottom: 20px;
            text-align: center;
        }

        .stats {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        /* The 4x4 Grid Container */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            width: 90vw;
            height: 90vw;
            max-width: 400px;
            max-height: 400px;
            perspective: 1000px;
        }

        /* Individual Cards */
        .card {
            background-color: var(--card-color);
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border-radius: 8px;
        }

        .card-front {
            background-color: #333;
        }

        .card-back {
            background-color: var(--accent-color);
            transform: rotateY(180deg);
        }

        .btn {
            margin-top: 30px;
            padding: 12px 24px;
            font-size: 1rem;
            background-color: var(--accent-color);
            border: none;
            border-radius: 5px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Memory 4x4</h1>
        <div class="stats">Moves: <span id="moves">0</span></div>
    </div>

    <div class="grid" id="grid">
        </div>

    <button class="btn" onclick="resetGame()">New Game</button>

    <script>
        const grid = document.getElementById('grid');
        const movesDisplay = document.getElementById('moves');
        let cards = [];
        let flippedCards = [];
        let moves = 0;
        let matchedPairs = 0;

        // Emoji pairs for the 4x4 (8 pairs)
        const icons = ['🔥', '⚡', '💎', '🎨', '🚀', '🌈', '🍕', '🎮'];
        const deck = [...icons, ...icons];

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function createBoard() {
            grid.innerHTML = '';
            const shuffledDeck = shuffle(deck);
            
            shuffledDeck.forEach((icon, index) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.icon = icon;
                card.dataset.id = index;

                card.innerHTML = `
                    <div class="card-front">?</div>
                    <div class="card-back">${icon}</div>
                `;

                card.addEventListener('click', flipCard);
                grid.appendChild(card);
            });
        }

        function flipCard() {
            if (flippedCards.length < 2 && !this.classList.contains('flipped')) {
                this.classList.add('flipped');
                flippedCards.push(this);

                if (flippedCards.length === 2) {
                    moves++;
                    movesDisplay.innerText = moves;
                    checkMatch();
                }
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            
            if (card1.dataset.icon === card2.dataset.icon) {
                matchedPairs++;
                flippedCards = [];
                if (matchedPairs === 8) {
                    setTimeout(() => alert(`You won in ${moves} moves!`), 500);
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                }, 1000);
            }
        }

        function resetGame() {
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            flippedCards = [];
            createBoard();
        }

        // Initialize
        createBoard();
    </script>
</body>
</html>
