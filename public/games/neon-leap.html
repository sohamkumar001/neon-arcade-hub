<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Leap // Orbit</title>
    <style>
        :root { --cyan: #00f2ff; --pink: #ff007b; --bg: #0a0a12; }
        * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    touch-action: none; 
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    -webkit-user-drag: none;
}
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        canvas { cursor: pointer; max-width: 100%; max-height: 100%; }
        
        #ui {
            position: absolute; top: 40px; text-align: center; pointer-events: none;
            text-transform: uppercase; letter-spacing: 4px;
        }
        #score { font-size: 3rem; font-weight: 900; color: var(--cyan); text-shadow: 0 0 20px var(--cyan); }
        
        #overlay {
            position: absolute; inset: 0; background: rgba(10, 10, 18, 0.85);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; backdrop-filter: blur(8px);
        }
        .msg { color: var(--pink); margin-bottom: 20px; font-weight: bold; }
        button {
            background: transparent; border: 2px solid var(--cyan); color: var(--cyan);
            padding: 15px 40px; font-size: 1rem; cursor: pointer; font-family: inherit;
            font-weight: bold; transition: 0.2s; box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }
        button:hover { background: var(--cyan); color: black; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score">0</div>
        <div style="font-size: 0.7rem; opacity: 0.6;">System Stability</div>
    </div>

    <div id="overlay">
        <div class="msg" id="final-msg">NEON LEAP</div>
        <button onclick="startGame()">INITIATE JUMP</button>
    </div>

    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const overlay = document.getElementById('overlay');
    const finalMsg = document.getElementById('final-msg');

    let w, h, centerX, centerY;
    let score = 0;
    let gameActive = false;
    let frame = 0;

    // Game Constants
    const rings = [60, 110, 160, 210];
    let player = { ringIdx: 0, angle: 0, speed: 0.05, jumping: false, targetRadius: rings[0], currentRadius: rings[0] };
    let enemies = [];

    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        centerX = w / 2;
        centerY = h / 2;
    }

    function spawnEnemy() {
        const ringIdx = Math.floor(Math.random() * rings.length);
        const speed = (0.02 + (score * 0.001)) * (Math.random() > 0.5 ? 1 : -1);
        enemies.push({
            ringIdx: ringIdx,
            angle: Math.random() * Math.PI * 2,
            arcLength: 0.5 + Math.random() * 1.5,
            speed: speed
        });
    }

    function startGame() {
        score = 0;
        scoreEl.innerText = score;
        enemies = [];
        player = { ringIdx: 0, angle: 0, speed: 0.05, jumping: false, targetRadius: rings[0], currentRadius: rings[0] };
        gameActive = true;
        overlay.style.display = 'none';
        loop();
    }

    function jump() {
        if (!gameActive) return;
        player.ringIdx++;
        score++;
        scoreEl.innerText = score;
        
        if (player.ringIdx >= rings.length) {
            player.ringIdx = 0; // Reset to center
            player.currentRadius = 0; 
        }
        player.targetRadius = rings[player.ringIdx];
        
        if (score % 5 === 0) spawnEnemy();
    }

    window.addEventListener('mousedown', jump);
    window.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });

    function loop() {
        if (!gameActive) return;
        frame++;

        // Clear
        ctx.fillStyle = '#0a0a12';
        ctx.fillRect(0, 0, w, h);

        // Draw Rings
        ctx.strokeStyle = '#1a1a2e';
        ctx.lineWidth = 2;
        rings.forEach(r => {
            ctx.beginPath();
            ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
            ctx.stroke();
        });

        // Update & Draw Player
        player.angle += player.speed;
        // Smooth transition between rings
        player.currentRadius += (player.targetRadius - player.currentRadius) * 0.2;
        
        const px = centerX + Math.cos(player.angle) * player.currentRadius;
        const py = centerY + Math.sin(player.angle) * player.currentRadius;

        ctx.fillStyle = '#00f2ff';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00f2ff';
        ctx.beginPath();
        ctx.arc(px, py, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Update & Draw Enemies
        enemies.forEach((en, index) => {
            en.angle += en.speed;
            const r = rings[en.ringIdx];
            
            ctx.strokeStyle = '#ff007b';
            ctx.lineWidth = 6;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff007b';
            ctx.beginPath();
            ctx.arc(centerX, centerY, r, en.angle, en.angle + en.arcLength);
            ctx.stroke();
            ctx.shadowBlur = 0;

            // Collision Check
            if (en.ringIdx === player.ringIdx) {
                // Normalize angles to 0-2PI
                let pA = player.angle % (Math.PI * 2);
                if (pA < 0) pA += Math.PI * 2;
                
                let eStart = en.angle % (Math.PI * 2);
                if (eStart < 0) eStart += Math.PI * 2;
                let eEnd = (en.angle + en.arcLength) % (Math.PI * 2);
                if (eEnd < 0) eEnd += Math.PI * 2;

                // Simple check if player angle is within enemy arc
                const inArc = eStart < eEnd 
                    ? (pA > eStart && pA < eEnd)
                    : (pA > eStart || pA < eEnd);

                if (inArc && Math.abs(player.currentRadius - r) < 10) {
                    gameOver();
                }
            }
        });

        requestAnimationFrame(loop);
    }

    function gameOver() {
        gameActive = false;
        finalMsg.innerHTML = `LINK SEVERED<br><span style="font-size:0.8rem; color:white">SCORE: ${score}</span>`;
        overlay.style.display = 'flex';
    }

    window.addEventListener('resize', init);
    init();
</script>
</body>
</html>
