<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Sudoku (Pixel Perfect & Audio)</title>
    <style>
        :root {
            --bg: #050508;
            --cell: #121217;
            --border: #333;
            --neon: #00ff41; /* Changed to green to match standard retro terminal */
            --error: #ff003c;
            --fixed: #ffffff;
            --highlight: #1a2b1a;
        }

        * { box-sizing: border-box; touch-action: none; user-select: none; }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Courier New', Courier, monospace; /* Pixel style font */
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #game-container {
            position: relative;
            z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            width: 95vw; max-width: 450px;
            aspect-ratio: 1/1;
            border: 4px solid var(--neon);
            background: var(--border);
            gap: 2px;
            box-shadow: 6px 6px 0px rgba(0, 255, 65, 0.2); /* Blocky shadow */
        }

        .cell {
            background: var(--cell);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; cursor: pointer; position: relative;
            font-weight: bold;
        }

        .cell.fixed { color: var(--fixed); }
        .cell.user { color: var(--neon); }
        .cell.selected { background: var(--highlight); outline: 4px solid var(--neon); z-index: 2; }
        
        /* Hard pixel shadow instead of blur for error */
        .cell.error { 
            color: var(--error); 
            text-shadow: 2px 2px 0px rgba(255, 0, 60, 0.5); 
        }

        /* Thick borders for 3x3 blocks */
        .cell:nth-child(3n) { border-right: 4px solid var(--neon); }
        .cell:nth-child(9n) { border-right: none; }
        #sudoku-grid > div:nth-child(n+19):nth-child(-n+27),
        #sudoku-grid > div:nth-child(n+46):nth-child(-n+54) { border-bottom: 4px solid var(--neon); }

        #num-pad {
            display: grid; grid-template-columns: repeat(5, 1fr);
            width: 95vw; max-width: 450px; gap: 10px; margin-top: 30px;
        }

        .num-btn {
            background: var(--cell); color: var(--neon); border: 2px solid var(--neon);
            padding: 15px 0; text-align: center; font-weight: bold; font-size: 1.2rem; cursor: pointer;
            box-shadow: 4px 4px 0px rgba(0, 255, 65, 0.2);
            transition: transform 0.05s;
        }

        .num-btn:active { 
            background: var(--neon); color: black; 
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px transparent;
        }

        #overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
            border: 8px double var(--neon); margin: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            text-shadow: 4px 4px 0px #000, 6px 6px 0px var(--neon);
        }

        .btn { 
            background: var(--neon); color: black; border: none; padding: 15px 40px; 
            font-weight: bold; cursor: pointer; font-family: inherit; font-size: 1.2rem;
            box-shadow: 4px 4px 0px #fff; transition: transform 0.1s;
        }
        .btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px #fff; }
        .hidden { display: none !important; }

        /* Retro CRT Scanlines */
        #scanlines {
            position: fixed; inset: 0; z-index: 50; pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="sudoku-grid"></div>

        <div id="num-pad">
            <div class="num-btn" onclick="inputNum(1)">1</div>
            <div class="num-btn" onclick="inputNum(2)">2</div>
            <div class="num-btn" onclick="inputNum(3)">3</div>
            <div class="num-btn" onclick="inputNum(4)">4</div>
            <div class="num-btn" onclick="inputNum(5)">5</div>
            <div class="num-btn" onclick="inputNum(6)">6</div>
            <div class="num-btn" onclick="inputNum(7)">7</div>
            <div class="num-btn" onclick="inputNum(8)">8</div>
            <div class="num-btn" onclick="inputNum(9)">9</div>
            <div class="num-btn" onclick="inputNum(0)" style="border-color: var(--error); color: var(--error); box-shadow: 4px 4px 0px rgba(255,0,60,0.2);">DEL</div>
        </div>
    </div>

    <div id="overlay">
        <h1>NEON SUDOKU</h1>
        <p>PIXEL PROTOCOL v2.0</p>
        <button class="btn" id="startBtn">BOOT SYSTEM</button>
    </div>

    <div id="scanlines"></div>

<script>
    const gridEl = document.getElementById('sudoku-grid');
    const startBtn = document.getElementById('startBtn');
    const overlay = document.getElementById('overlay');
    
    let board = Array(81).fill(0);
    let solution = [];
    let initialIndices = new Set();
    let selectedIdx = -1;

    // --- AUDIO SYSTEM (Web Audio API) ---
    let audioCtx;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        
        if (type === 'select') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(600, now + 0.05);
            gainNode.gain.setValueAtTime(0.05, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
            osc.start(now); osc.stop(now + 0.05);
        } else if (type === 'place') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(800, now);
            gainNode.gain.setValueAtTime(0.05, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'error') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            gainNode.gain.setValueAtTime(0.1, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        } else if (type === 'erase') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(250, now);
            osc.frequency.linearRampToValueAtTime(50, now + 0.1);
            gainNode.gain.setValueAtTime(0.05, now);
            gainNode.gain.linearRampToValueAtTime(0.001, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'boot') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(100, now);
            osc.frequency.exponentialRampToValueAtTime(800, now + 0.3);
            gainNode.gain.setValueAtTime(0.1, now);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'win') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.setValueAtTime(500, now + 0.1);
            osc.frequency.setValueAtTime(600, now + 0.2);
            osc.frequency.setValueAtTime(800, now + 0.3);
            gainNode.gain.setValueAtTime(0.1, now);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.6);
            osc.start(now); osc.stop(now + 0.6);
        }
    }
    // ------------------------------------

    function generateSudoku() {
        board = Array(81).fill(0);
        solve(board); 
        solution = [...board];
        
        let attempts = 45; 
        while (attempts > 0) {
            let idx = Math.floor(Math.random() * 81);
            if (board[idx] !== 0) {
                board[idx] = 0;
                attempts--;
            }
        }
        
        initialIndices.clear();
        board.forEach((val, i) => { if(val !== 0) initialIndices.add(i); });
        render();
    }

    function solve(b) {
        for (let i = 0; i < 81; i++) {
            if (b[i] === 0) {
                let nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
                for (let n of nums) {
                    if (isValid(b, i, n)) {
                        b[i] = n;
                        if (solve(b)) return true;
                        b[i] = 0;
                    }
                }
                return false;
            }
        }
        return true;
    }

    function isValid(b, idx, n) {
        let r = Math.floor(idx / 9), c = idx % 9;
        for (let i = 0; i < 9; i++) {
            if (b[r * 9 + i] === n || b[i * 9 + c] === n) return false;
            let br = 3 * Math.floor(r / 3) + Math.floor(i / 3);
            let bc = 3 * Math.floor(c / 3) + (i % 3);
            if (b[br * 9 + bc] === n) return false;
        }
        return true;
    }

    function render() {
        gridEl.innerHTML = '';
        board.forEach((val, i) => {
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (initialIndices.has(i)) cell.classList.add('fixed');
            else cell.classList.add('user');
            
            if (val !== 0) {
                cell.innerText = val;
                if (!initialIndices.has(i) && val !== solution[i]) cell.classList.add('error');
            }
            
            if (selectedIdx === i) cell.classList.add('selected');
            
            cell.onmousedown = (e) => { 
                e.preventDefault();
                selectedIdx = i; 
                playSound('select');
                render(); 
            };
            // Touch support
            cell.ontouchstart = (e) => {
                e.preventDefault();
                selectedIdx = i; 
                playSound('select');
                render(); 
            };
            
            gridEl.appendChild(cell);
        });
    }

    function inputNum(n) {
        if (selectedIdx === -1 || initialIndices.has(selectedIdx)) return;
        
        board[selectedIdx] = n;
        
        if (n === 0) {
            playSound('erase');
        } else if (n !== solution[selectedIdx]) {
            playSound('error');
        } else {
            playSound('place');
        }

        render();
        
        if (!board.includes(0) && board.every((v, i) => v === solution[i])) {
            setTimeout(() => { 
                playSound('win');
                alert("SYSTEM STABILIZED: You Win!"); 
            }, 100);
        }
    }

    window.onkeydown = (e) => {
        if (e.key >= 1 && e.key <= 9) inputNum(parseInt(e.key));
        if (e.key === 'Backspace' || e.key === 'Delete') inputNum(0);
        
        // Arrow key navigation
        if (selectedIdx !== -1) {
            let row = Math.floor(selectedIdx / 9);
            let col = selectedIdx % 9;
            
            if (e.key === 'ArrowUp' && row > 0) { selectedIdx -= 9; playSound('select'); render(); }
            if (e.key === 'ArrowDown' && row < 8) { selectedIdx += 9; playSound('select'); render(); }
            if (e.key === 'ArrowLeft' && col > 0) { selectedIdx -= 1; playSound('select'); render(); }
            if (e.key === 'ArrowRight' && col < 8) { selectedIdx += 1; playSound('select'); render(); }
        }
    };

    startBtn.onclick = () => {
        initAudio();
        playSound('boot');
        generateSudoku();
        overlay.classList.add('hidden');
    };
</script>
</body>
</html>
